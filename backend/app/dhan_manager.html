<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhan Token Manager - SignalCraft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .subtitle {
            color: #8892b0;
            text-align: center;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card h2 {
            color: #fff;
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-left: auto;
        }
        .status-valid {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }
        .status-invalid {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #38BDF8;
            color: #0F2744;
        }
        .btn-primary:hover {
            background: #0EA5E9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .info-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
        }
        .info-label {
            color: #8892b0;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }
        .info-value {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'DM Mono', monospace;
        }
        .price-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .price-card {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .price-name {
            color: #8892b0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .price-value {
            color: #fff;
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'DM Mono', monospace;
            margin-bottom: 5px;
        }
        .price-change {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .price-up {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }
        .price-down {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .log-box {
            background: #000;
            padding: 15px;
            border-radius: 10px;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: #34D399;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 15px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #8892b0;
        }
        .success-msg {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            padding: 12px 20px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px 20px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Dhan Token Manager</h1>
        <p class="subtitle">Manage your Dhan API authentication and view live market data</p>

        <!-- Token Status Card -->
        <div class="card">
            <h2>
                Token Status
                <span id="token-status" class="status-badge status-invalid">Checking...</span>
            </h2>
            
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Client ID</div>
                    <div class="info-value" id="client-id">--</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Token Length</div>
                    <div class="info-value" id="token-length">--</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Configuration</div>
                    <div class="info-value" id="config-status">--</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Last Checked</div>
                    <div class="info-value" id="last-checked">--</div>
                </div>
            </div>

            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="validateToken()">
                    ✓ Validate Token
                </button>
                <button class="btn btn-secondary" onclick="refreshToken()">
                    🔄 Refresh Token
                </button>
                <button class="btn btn-secondary" onclick="autoRefresh()">
                    ⚡ Auto Refresh
                </button>
            </div>

            <div id="token-success" class="success-msg"></div>
            <div id="token-error" class="error-msg"></div>
            <div id="token-log" class="log-box"></div>
        </div>

        <!-- Live Prices Card -->
        <div class="card">
            <h2>📊 Live Index Prices <span style="font-size: 0.9rem; color: #8892b0; margin-left: 10px;">via Dhan WebSocket</span></h2>
            
            <div class="price-grid">
                <div class="price-card">
                    <div class="price-name">NIFTY 50</div>
                    <div class="price-value" id="nifty-price">--</div>
                    <div class="price-change" id="nifty-change">--</div>
                </div>
                
                <div class="price-card">
                    <div class="price-name">BANKNIFTY</div>
                    <div class="price-value" id="banknifty-price">--</div>
                    <div class="price-change" id="banknifty-change">--</div>
                </div>
                
                <div class="price-card">
                    <div class="price-name">FINNIFTY</div>
                    <div class="price-value" id="finnifty-price">--</div>
                    <div class="price-change" id="finnifty-change">--</div>
                </div>
                
                <div class="price-card">
                    <div class="price-name">SENSEX</div>
                    <div class="price-value" id="sensex-price">--</div>
                    <div class="price-change" id="sensex-change">--</div>
                </div>
            </div>
            
            <div style="margin-top: 20px; text-align: center; color: #8892b0; font-size: 0.9rem;">
                <span id="ws-status">Connecting to WebSocket...</span>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        
        function log(msg) {
            const time = new Date().toLocaleTimeString();
            const logEl = document.getElementById('token-log');
            logEl.innerHTML = `[${time}] ${msg}\n` + logEl.innerHTML;
        }

        function showSuccess(msg) {
            const el = document.getElementById('token-success');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function showError(msg) {
            const el = document.getElementById('token-error');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        async function fetchStatus() {
            try {
                const res = await fetch(`${API_BASE}/api/dhan/status`);
                const data = await res.json();
                
                document.getElementById('client-id').textContent = data.client_id || 'Not configured';
                document.getElementById('token-length').textContent = data.token_length || 0;
                document.getElementById('config-status').textContent = data.status;
                document.getElementById('last-checked').textContent = new Date().toLocaleTimeString();
                
                if (data.status === 'configured' && data.token_present) {
                    document.getElementById('token-status').className = 'status-badge status-valid';
                    document.getElementById('token-status').textContent = '● Configured';
                } else {
                    document.getElementById('token-status').className = 'status-badge status-invalid';
                    document.getElementById('token-status').textContent = '○ Not Configured';
                }
            } catch (err) {
                log('Error fetching status: ' + err.message);
            }
        }

        async function validateToken() {
            log('Validating token...');
            try {
                const res = await fetch(`${API_BASE}/api/dhan/validate`, { method: 'POST' });
                const data = await res.json();
                
                if (data.valid) {
                    log('Token is VALID ✓');
                    showSuccess('Token is valid and working!');
                    document.getElementById('token-status').className = 'status-badge status-valid';
                    document.getElementById('token-status').textContent = '● Valid';
                } else {
                    log('Token is INVALID ✗');
                    showError('Token expired or invalid: ' + data.message);
                    document.getElementById('token-status').className = 'status-badge status-invalid';
                    document.getElementById('token-status').textContent = '✗ Invalid';
                }
            } catch (err) {
                log('Validation error: ' + err.message);
                showError('Validation failed: ' + err.message);
            }
        }

        async function refreshToken() {
            log('Requesting fresh token from Dhan...');
            try {
                const res = await fetch(`${API_BASE}/api/dhan/refresh`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    log('Token refreshed successfully!');
                    showSuccess(`Token refreshed! Expires in ${data.data.expires_in_hours} hours`);
                    fetchStatus();
                } else {
                    log('Token refresh failed');
                    showError('Refresh failed: ' + data.detail);
                }
            } catch (err) {
                log('Refresh error: ' + err.message);
                showError('Refresh failed: ' + err.message);
            }
        }

        async function autoRefresh() {
            log('Running auto-refresh...');
            try {
                const res = await fetch(`${API_BASE}/api/dhan/auto-refresh`, { method: 'POST' });
                const data = await res.json();
                
                if (data.refreshed) {
                    log('Token was refreshed (was expired)');
                    showSuccess('Token auto-refreshed successfully!');
                } else {
                    log('Token still valid, no refresh needed');
                    showSuccess(data.message);
                }
                fetchStatus();
            } catch (err) {
                log('Auto-refresh error: ' + err.message);
                showError('Auto-refresh failed: ' + err.message);
            }
        }

        function updatePrices(data) {
            for (const [symbol, quote] of Object.entries(data)) {
                const id = symbol.toLowerCase().replace(' ', '');
                const priceEl = document.getElementById(`${id}-price`);
                const changeEl = document.getElementById(`${id}-change`);
                
                if (priceEl && changeEl) {
                    priceEl.textContent = quote.ltp.toLocaleString('en-IN', { minimumFractionDigits: 2 });
                    const sign = quote.up ? '+' : '';
                    const cls = quote.up ? 'price-up' : 'price-down';
                    const arrow = quote.up ? '↑' : '↓';
                    changeEl.className = `price-change ${cls}`;
                    changeEl.innerHTML = `${arrow} ${sign}${quote.chg}%`;
                }
            }
        }

        function connectWebSocket() {
            const ws = new WebSocket(`ws://localhost:8000/ws/quotes`);
            
            ws.onopen = () => {
                document.getElementById('ws-status').innerHTML = '<span style="color: #4ade80;">● Connected to Dhan WebSocket</span>';
                log('WebSocket connected');
            };
            
            ws.onclose = () => {
                document.getElementById('ws-status').innerHTML = '<span style="color: #f87171;">○ Disconnected - Reconnecting...</span>';
                log('WebSocket disconnected');
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'quotes') {
                    updatePrices(msg.data);
                }
            };
        }

        // Initial load
        fetchStatus();
        connectWebSocket();
        
        // Refresh status every 30 seconds
        setInterval(fetchStatus, 30000);
    </script>
</body>
</html>
